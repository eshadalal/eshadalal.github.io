<!DOCTYPE html>
<html>
<body style="background-color:black;">
<h1>Hey there, I'm Esha.</h1>
<p>I'm so happy that you're here. It's a big world out there. This is my little corner. </p>
<style> 
@import url('https://fonts.googleapis.com/css2?family=Comforter&family=Roboto:wght@300;400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Comforter&family=Roboto:wght@300;400&display=swap');

h1 { 
    font-family: 'Comforter', cursive;
    color: white;
    text-align: center;
    font-size: 70px;
}
p {
    font-family: 'Comforter', cursive;
    color: white;
    text-align: center;
    font-size: 50px;
}

</style>

<p id="demo"></p>

<script>
    var i = 0;
    var txt = h1;
    var speed = 50;
    
    function typeWriter() {
      if (i < txt.length) {
        document.getElementById("demo").innerHTML += txt.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      }
    }
    </script>
        
</body>
</html>
